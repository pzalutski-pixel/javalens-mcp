name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Install Maven (Linux)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y maven

    - name: Install Maven (macOS)
      if: runner.os == 'macOS'
      run: brew install maven

    - name: Install Maven (Windows)
      if: runner.os == 'Windows'
      run: choco install maven --no-progress

    # apt's Gradle on ubuntu-latest is 4.x, too old for our init script.
    # Use the vendor-supported action on Linux + macOS, and Windows chocolatey for parity.
    - name: Install Gradle (Linux + macOS)
      if: runner.os != 'Windows'
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.10.2'

    - name: Install Gradle (Windows)
      if: runner.os == 'Windows'
      run: choco install gradle --no-progress

    - name: Install Bazel
      uses: bazel-contrib/setup-bazel@0.8.5
      with:
        bazelisk-cache: true
        disk-cache: true
        repository-cache: true

    - name: Cache Maven local repository
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml', '**/test-resources/sample-projects/**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-m2-

    - name: Cache Gradle caches
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/test-resources/sample-projects/**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build and Test
      env:
        JAVALENS_TESTS_REQUIRE_TOOLS: "true"
      run: ./mvnw clean verify

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}
        path: |
          **/target/surefire-reports/
          **/target/failsafe-reports/
