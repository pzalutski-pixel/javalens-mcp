name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            jdk_distribution: temurin
          - os: macos-latest
            jdk_distribution: temurin
          # Microsoft Build of OpenJDK on Windows ships a complete JDK structure
          # (lib/jvm.cfg present and openable). Temurin 21 on the windows-latest
          # hostedtoolcache fails the mvn.cmd launcher's java startup with
          # "could not open lib/jvm.cfg" even though mvnw (which invokes java
          # through a different launcher path) works on the same runner.
          - os: windows-latest
            jdk_distribution: microsoft
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: ${{ matrix.jdk_distribution }}

    # Maven: setup-java installs the JDK only. We need mvn on PATH for fixture tests
    # that invoke it directly. apt/brew provide working binaries; on Windows, choco's
    # mvn.cmd launcher is incompatible with setup-java's Temurin JDK (it tries to read
    # lib/jvm.cfg which Temurin doesn't ship), so we extract the Apache distribution
    # directly and add its bin to PATH.
    - name: Install Maven (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt-get update && sudo apt-get install -y maven

    - name: Install Maven (macOS)
      if: matrix.os == 'macos-latest'
      run: brew install maven

    - name: Install Maven (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $version = "3.9.9"
        $url = "https://archive.apache.org/dist/maven/maven-3/$version/binaries/apache-maven-$version-bin.zip"
        Invoke-WebRequest -Uri $url -OutFile $env:RUNNER_TEMP\maven.zip
        Expand-Archive -Path $env:RUNNER_TEMP\maven.zip -DestinationPath $env:RUNNER_TEMP\maven
        $bin = "$env:RUNNER_TEMP\maven\apache-maven-$version\bin"
        Add-Content $env:GITHUB_PATH $bin

    # Separate JDK for child mvn/gradle subprocesses on Windows. The Tycho-surefire test
    # JVM holds the JDK's lib/jvm.cfg open in a way that causes ProcessBuilder-spawned
    # java.exe (running from the SAME JDK) to fail with "could not open jvm.cfg" when it
    # tries to read its own copy. Pointing child subprocesses at a *different* JDK
    # installation breaks the conflict — each java.exe opens its own jvm.cfg.
    - name: Install separate child-process JDK (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $cleanRoot = Join-Path $env:RUNNER_TEMP "childjdk"
        # Tell Defender to leave the JDK alone before extraction. Without this, Defender
        # silently removes child-jdk\bin\java.exe between extraction and test execution
        # (newly-extracted .exe files from a downloaded zip carry Mark-of-the-Web; the
        # runner's real-time protection then deletes them on access). Add-MpPreference
        # is admin-only but the GitHub runner runs steps as admin.
        Add-MpPreference -ExclusionPath $cleanRoot -ErrorAction SilentlyContinue

        $jdkUrl = "https://aka.ms/download-jdk/microsoft-jdk-21.0.5-windows-x64.zip"
        Invoke-WebRequest -Uri $jdkUrl -OutFile $env:RUNNER_TEMP\child-jdk.zip
        Expand-Archive -Path $env:RUNNER_TEMP\child-jdk.zip -DestinationPath $env:RUNNER_TEMP\child-jdk-extract
        # Find java.exe empirically — extraction structure varies between vendors.
        $javaExe = Get-ChildItem -Recurse -Filter "java.exe" $env:RUNNER_TEMP\child-jdk-extract |
                   Where-Object { $_.Directory.Name -eq "bin" } |
                   Select-Object -First 1
        if (-not $javaExe) { throw "java.exe not found under extracted JDK!" }
        $jdkRoot = $javaExe.Directory.Parent.FullName
        Move-Item $jdkRoot $cleanRoot
        # Strip Mark-of-the-Web from every file under the JDK so Defender doesn't
        # quarantine them on first access from a child process.
        Get-ChildItem -Recurse $cleanRoot | Unblock-File -ErrorAction SilentlyContinue
        echo "Child JDK at: $cleanRoot"
        if (-not (Test-Path "$cleanRoot\bin\java.exe")) { throw "java.exe missing under $cleanRoot\bin" }
        echo "JAVALENS_TESTS_CHILD_JAVA_HOME=$cleanRoot" >> $env:GITHUB_ENV

    # Gradle: vendor-supported action on Linux/macOS adds the binary to PATH for
    # subsequent steps; the same parameter on Windows did not propagate to the
    # surefire JVM in practice (resolveGradleBinary saw no gradle.bat). Using the
    # same direct-extract pattern as Maven on Windows for consistency.
    - name: Install Gradle (Linux + macOS)
      if: matrix.os != 'windows-latest'
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.10.2'

    - name: Install Gradle (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $version = "8.10.2"
        $url = "https://services.gradle.org/distributions/gradle-$version-bin.zip"
        Invoke-WebRequest -Uri $url -OutFile $env:RUNNER_TEMP\gradle.zip
        Expand-Archive -Path $env:RUNNER_TEMP\gradle.zip -DestinationPath $env:RUNNER_TEMP\gradle
        $bin = "$env:RUNNER_TEMP\gradle\gradle-$version\bin"
        Add-Content $env:GITHUB_PATH $bin

    # Bazel via bazelisk — installs the Bazel version pinned in fixtures via .bazelversion files.
    - name: Install bazelisk
      uses: bazel-contrib/setup-bazel@0.8.5
      with:
        bazelisk-cache: true
        disk-cache: true
        repository-cache: true

    - name: Cache Maven local repository
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml', '**/test-resources/sample-projects/**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-m2-

    - name: Cache Gradle caches
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/test-resources/sample-projects/**/*.gradle*', '**/test-resources/sample-projects/**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Diagnostic — runner toolchain state
      shell: bash
      run: |
        echo "=== os.name / arch ==="
        uname -a || echo "(uname not available)"
        echo "=== JAVA_HOME ==="
        echo "JAVA_HOME=$JAVA_HOME"
        ls -la "$JAVA_HOME/lib/jvm.cfg" 2>&1 || echo "(jvm.cfg not at JAVA_HOME/lib/jvm.cfg)"
        echo "=== JAVALENS_TESTS_CHILD_JAVA_HOME ==="
        echo "JAVALENS_TESTS_CHILD_JAVA_HOME=$JAVALENS_TESTS_CHILD_JAVA_HOME"
        if [ -n "$JAVALENS_TESTS_CHILD_JAVA_HOME" ]; then
          ls -la "$JAVALENS_TESTS_CHILD_JAVA_HOME/bin/java.exe" 2>&1 || echo "(child java.exe missing)"
          ls -la "$JAVALENS_TESTS_CHILD_JAVA_HOME/lib/jvm.cfg" 2>&1 || echo "(child jvm.cfg missing)"
          "$JAVALENS_TESTS_CHILD_JAVA_HOME/bin/java" -version 2>&1 || echo "(child java -version failed)"
          echo "=== mvn with child JAVA_HOME ==="
          JAVA_HOME="$JAVALENS_TESTS_CHILD_JAVA_HOME" mvn -v 2>&1 || echo "(mvn -v with child JAVA_HOME failed)"
        fi
        echo "=== PATH ==="
        echo "$PATH" | tr : '\n' | tr ';' '\n'
        echo "=== mvn ==="
        which mvn || echo "(mvn not found)"
        mvn -v 2>&1 || echo "(mvn -v failed)"
        echo "=== gradle ==="
        which gradle || echo "(gradle not found)"
        gradle -v 2>&1 || echo "(gradle -v failed)"
        echo "=== bazel ==="
        which bazel || echo "(bazel not found)"
        bazel --version 2>&1 || echo "(bazel --version failed)"
        echo "=== java ==="
        which java
        java -version 2>&1

    - name: Build and Test
      env:
        # Tests gate optional steps via Assumptions so local dev doesn't fail on a clean
        # machine. In CI we install every tool above, so any skip would mean a real
        # provisioning gap. This env var flips the gate to assert-presence: tests fail
        # loudly instead of skipping when a required tool is missing.
        JAVALENS_TESTS_REQUIRE_TOOLS: "true"
      run: ./mvnw clean verify

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}
        path: |
          **/target/surefire-reports/
          **/target/failsafe-reports/
